name: renkevia
description: RENKEVIA institutional change compiler — Flutter Web demo surface.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  # Flutter's web icon tree shaker retains a framework-level Cupertino
  # fallback even though RENKEVIA itself uses Material symbols.
  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
